<!DOCTYPE html>
<html lang="id">

<head>

    <head>
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>EDUVA — Login</title>
        <link href="https://fonts.bunny.net/css?family=syne:400,600,700,800|dm-sans:300,400,500&display=swap"
            rel="stylesheet" />
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0a0e1a;
                --surface: #111827;
                --border: #1e2d45;
                --accent: #3b82f6;
                --accent2: #06b6d4;
                --text: #f0f4ff;
                --muted: #64748b;
                --success: #10b981;
                --error: #ef4444;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: 'DM Sans', sans-serif;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                position: relative;
            }

            /* Background blobs */
            body::before {
                content: '';
                position: fixed;
                top: -200px;
                left: -200px;
                width: 600px;
                height: 600px;
                background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
                pointer-events: none;
                animation: blobMove 8s ease-in-out infinite alternate;
            }

            body::after {
                content: '';
                position: fixed;
                bottom: -200px;
                right: -200px;
                width: 500px;
                height: 500px;
                background: radial-gradient(circle, rgba(6, 182, 212, 0.12) 0%, transparent 70%);
                pointer-events: none;
                animation: blobMove 10s ease-in-out infinite alternate-reverse;
            }

            @keyframes blobMove {
                from {
                    transform: translate(0, 0);
                }

                to {
                    transform: translate(40px, 30px);
                }
            }

            .card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 24px;
                padding: 48px 44px;
                width: 100%;
                max-width: 440px;
                position: relative;
                z-index: 1;
                box-shadow: 0 0 80px rgba(59, 130, 246, 0.08);
                animation: fadeUp 0.5s ease both;
                max-height: 95vh;
                overflow-y: auto;
                overflow-x: hidden;
            }

            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(24px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .logo {
                font-family: 'Syne', sans-serif;
                font-weight: 800;
                font-size: 28px;
                letter-spacing: -0.5px;
                background: linear-gradient(135deg, var(--accent), var(--accent2));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                margin-bottom: 6px;
            }

            .tagline {
                font-size: 13px;
                color: var(--muted);
                margin-bottom: 36px;
            }

            /* Tabs */
            .tabs {
                display: flex;
                background: var(--bg);
                border-radius: 12px;
                padding: 4px;
                margin-bottom: 32px;
                border: 1px solid var(--border);
            }

            .tab {
                flex: 1;
                padding: 10px;
                text-align: center;
                font-family: 'Syne', sans-serif;
                font-size: 14px;
                font-weight: 600;
                color: var(--muted);
                border-radius: 9px;
                cursor: pointer;
                transition: all 0.25s;
                user-select: none;
            }

            .tab.active {
                background: var(--surface);
                color: var(--text);
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            }

            /* Forms */
            .form {
                display: none;
                flex-direction: column;
                gap: 16px;
            }

            .form.active {
                display: flex;
                animation: fadeUp 0.3s ease both;
            }

            label {
                font-size: 12px;
                font-weight: 500;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.8px;
                display: block;
                margin-bottom: 6px;
            }

            input,
            select {
                width: 100%;
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 12px 14px;
                color: var(--text);
                font-family: 'DM Sans', sans-serif;
                font-size: 15px;
                outline: none;
                transition: border-color 0.2s, box-shadow 0.2s;
            }

            input::placeholder {
                color: var(--muted);
            }

            input:focus,
            select:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
            }

            select option {
                background: var(--surface);
            }

            .btn {
                width: 100%;
                padding: 13px;
                background: linear-gradient(135deg, var(--accent), var(--accent2));
                color: #fff;
                font-family: 'Syne', sans-serif;
                font-size: 15px;
                font-weight: 700;
                border: none;
                border-radius: 10px;
                cursor: pointer;
                margin-top: 4px;
                transition: opacity 0.2s, transform 0.1s;
                letter-spacing: 0.3px;
            }

            .btn:hover {
                opacity: 0.9;
            }

            .btn:active {
                transform: scale(0.98);
            }

            .btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .msg {
                font-size: 13px;
                padding: 10px 14px;
                border-radius: 8px;
                display: none;
            }

            .msg.error {
                background: rgba(239, 68, 68, 0.1);
                color: var(--error);
                border: 1px solid rgba(239, 68, 68, 0.2);
                display: block;
            }

            .msg.success {
                background: rgba(16, 185, 129, 0.1);
                color: var(--success);
                border: 1px solid rgba(16, 185, 129, 0.2);
                display: block;
            }
        </style>
    </head>

<body>

    <div class="card">
        <div style="text-align:center; margin-bottom: 16px;">
            <img src="logo.svg" alt="EDUVA" style="height:100px;" />
        </div>
        <div class="tagline">Platform Analisis Kompetensi Siswa SMK</div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Masuk</div>
            <div class="tab" onclick="switchTab('register')">Daftar</div>
        </div>

        <!-- LOGIN FORM -->
        <form class="form active" id="form-login" onsubmit="handleLogin(event)">
            <div>
                <label>Email</label>
                <input type="email" id="login-email" placeholder="email@kamu.com" required />
            </div>
            <div>
                <label>Password</label>
                <input type="password" id="login-pass" placeholder="••••••••" required />
            </div>
            <div id="msg-login" class="msg"></div>
            <button type="submit" class="btn" id="btn-login">Masuk</button>
        </form>

        <!-- REGISTER FORM -->
        <form class="form" id="form-register" onsubmit="handleRegister(event)">
            <div>
                <label>Nama Lengkap</label>
                <input type="text" id="reg-nama" placeholder="Nama kamu" required />
            </div>
            <div>
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="email@kamu.com" required />
            </div>
            <div>
                <label>Password</label>
                <input type="password" id="reg-pass" placeholder="Min. 6 karakter" required />
            </div>
            <div>
                <label>Jurusan</label>
                <select id="reg-jurusan" required>
                    <option value="" disabled selected>Pilih jurusan</option>
                    <option value="TKJ">TKJ — Teknik Komputer & Jaringan</option>
                    <option value="RPL">RPL — Rekayasa Perangkat Lunak</option>
                    <option value="MM">Multimedia</option>
                    <option value="TKR">TKR — Teknik Kendaraan Ringan</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
            </div>
            <div>
                <label>Kelas</label>
                <select id="reg-kelas" required>
                    <option value="" disabled selected>Pilih kelas</option>
                    <option value="X">Kelas X</option>
                    <option value="XI">Kelas XI</option>
                    <option value="XII">Kelas XII</option>
                </select>
            </div>
            <div id="msg-register" class="msg"></div>
            <button type="submit" class="btn" id="btn-register">Buat Akun</button>
        </form>
    </div>

    <script>
        // =============================================
        // KONFIGURASI SUPABASE — GANTI JIKA PERLU
        // =============================================
        const SUPABASE_URL = 'https://gcathmmlblokgdikxncj.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_bZh2Iw1WKBjwkdsUjt31Bg_MF5anpOP'
        const { createClient } = supabase
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register')))
            document.getElementById('form-login').classList.toggle('active', tab === 'login')
            document.getElementById('form-register').classList.toggle('active', tab === 'register')
        }

        function showMsg(id, type, text) {
            const el = document.getElementById(id)
            el.className = 'msg ' + type
            el.textContent = text
        }

        // LOGIN
        async function handleLogin(e) {
            e.preventDefault()
            const btn = document.getElementById('btn-login')
            btn.disabled = true
            btn.textContent = 'Memproses...'

            const email = document.getElementById('login-email').value
            const pass = document.getElementById('login-pass').value

            const { data, error } = await sb.auth.signInWithPassword({ email, password: pass })

            if (error) {
                showMsg('msg-login', 'error', 'Email atau password salah.')
                btn.disabled = false
                btn.textContent = 'Masuk'
            } else {
                const { data: prof } = await sb.from('profiles').select('role').eq('id', data.user.id).maybeSingle()
                showMsg('msg-login', 'success', 'Login berhasil! Mengalihkan...')
                setTimeout(() => {
                    window.location.href = prof?.role === 'guru' ? 'dashboard-guru.html' : 'dashboard.html'
                }, 1200)
            }
        }

        // REGISTER
        async function handleRegister(e) {
            e.preventDefault()
            const btn = document.getElementById('btn-register')
            btn.disabled = true
            btn.textContent = 'Memproses...'

            const nama = document.getElementById('reg-nama').value
            const email = document.getElementById('reg-email').value
            const pass = document.getElementById('reg-pass').value
            const jurusan = document.getElementById('reg-jurusan').value
            const kelas = document.getElementById('reg-kelas').value

            const { data, error } = await sb.auth.signUp({ email, password: pass })

            if (error) {
                showMsg('msg-register', 'error', error.message)
                btn.disabled = false
                btn.textContent = 'Buat Akun'
                return
            }

            // Simpan profil ke tabel profiles
            const userId = data.user?.id
            if (userId) {
                await sb.from('profiles').insert({ id: userId, nama, jurusan, kelas })
            }

            showMsg('msg-register', 'success', 'Akun berhasil dibuat! Silakan login.')
            btn.disabled = false
            btn.textContent = 'Buat Akun'
            setTimeout(() => switchTab('login'), 1500)
        }
    </script>
</body>

</html>
